# Test Profile Configuration
# This profile is used for running the application in a test-like environment

# Database Configuration - Fallback to H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Security & JWT (Test values)
jwt.secret=test-secret-key-for-jwt-tokens-this-is-a-very-long-secret-key-for-testing-purposes-only-needs-to-be-at-least-32-characters
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000

# Redis & Cache (Disabled for test profile)
spring.cache.type=simple
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Mock OAuth2 values
GOOGLE_OAUTH2_CLIENT_ID=test-client-id
GOOGLE_OAUTH2_CLIENT_SECRET=test-client-secret
GOOGLE_OAUTH2_REDIRECT_URI=http://localhost:8080/login/oauth2/code/google

# App Specific Config
app.security.rbac.enabled=true
app.rate-limit.enabled=false
app.audit.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.hainam.worksphere=DEBUG
