spring.application.name=worksphere

# Database Configuration (common settings)
spring.jpa.hibernate.ddl-auto=update

# Redis Configuration (common settings)
spring.data.redis.timeout=2000ms
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# OAuth2 Configuration (common across all environments)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH2_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH2_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH2_REDIRECT_URI}

# JWT Configuration (common across all environments)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration=900000000

# Server Configuration (common)
server.port=${SERVER_PORT}

# Frontend Configuration (for OAuth2 redirects)
app.frontend.url=${FRONTEND_URL}
app.oauth.success-redirect-path=${OAUTH_SUCCESS_REDIRECT_PATH}

# Security Configuration
app.security.rbac.enabled=true

# Public Endpoints Configuration (comma-separated list)
app.security.public-endpoints=/api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/refresh,/api/v1/auth/oauth2/**,/api/public/**,/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html,/actuator/health,/error,/api/audit-demo/**,/api/test/**

# Audit Logging Configuration
app.audit.enabled=true
app.audit.log-parameters=false
app.audit.log-response=false
app.audit.log-only-success=false
app.audit.max-value-length=10000
app.audit.async-logging=true
app.audit.retention-days=365
app.audit.compress-old-logs=true

# Enable scheduling for token cleanup
spring.task.scheduling.pool.size=2

# Cache Configuration
spring.cache.type=redis

# Rate Limiting Configuration
app.rate-limit.enabled=true
app.rate-limit.default-requests-per-minute=100
app.rate-limit.login-requests-per-minute=10
app.rate-limit.register-requests-per-minute=5
app.rate-limit.refresh-token-requests-per-minute=30
app.rate-limit.anonymous-requests-per-minute=50
app.rate-limit.ban-duration-minutes=15
app.rate-limit.max-violations-before-ban=5

# Jackson Configuration for proper date/time serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS
spring.jackson.time-zone=UTC
# Explicitly disable JSR310 default behavior and force proper module registration
spring.jackson.default-property-inclusion=non_null

# Swagger/OpenAPI Configuration (common across all environments)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.swagger-ui.docExpansion=none
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

