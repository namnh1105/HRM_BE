services:
  postgres:
    image: postgres:15-alpine
    container_name: worksphere_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-worksphere}
      POSTGRES_USER: ${POSTGRES_USER:-worksphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worksphere123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    restart: unless-stopped
    networks:
      - worksphere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worksphere} -d ${POSTGRES_DB:-worksphere}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: worksphere_redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - worksphere-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worksphere:
    image: worksphere:latest
    container_name: worksphere_app
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - /opt/worksphere/logs:/opt/worksphere/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - worksphere-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

networks:
  worksphere-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
