name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: development
          JWT_SECRET: test-secret-key-for-ci-testing-purposes-only-32chars
          JWT_ACCESS_TOKEN_EXPIRATION: 3600000
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          GOOGLE_OAUTH2_CLIENT_ID: test-client-id
          GOOGLE_OAUTH2_CLIENT_SECRET: test-client-secret
          GOOGLE_OAUTH2_REDIRECT_URI: http://localhost:8080/login/oauth2/code/google
          SERVER_PORT: 8080
          FRONTEND_URL: http://localhost:3000
          OAUTH_SUCCESS_REDIRECT_PATH: /oauth/callback

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          outputs: type=docker,dest=/tmp/worksphere-image.tar
          tags: worksphere:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: worksphere-docker-image
          path: /tmp/worksphere-image.tar
          retention-days: 1

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: worksphere-docker-image
          path: /tmp

      - name: Verify secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_PORT: ${{ secrets.APP_PORT }}
        run: |
          for var in VPS_SSH_KEY VPS_HOST VPS_USER APP_PORT; do
            if [ -z "${!var}" ]; then
              echo "❌ Secret $var is not set"
              exit 1
            fi
          done
          echo "✅ All required secrets are configured"

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create deployment directory on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            sudo mkdir -p /opt/worksphere/backup
          EOF

      - name: Backup current Docker image
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            cd /opt/worksphere
            if docker images | grep -q worksphere; then
              docker tag worksphere:latest worksphere:backup-$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
              # Clean up old backup images (keep only 3 most recent)
              docker images worksphere --format "table {{.Tag}}" | grep backup | sort -r | tail -n +4 | xargs -r -I {} docker rmi worksphere:{} 2>/dev/null || true
            fi
          EOF

      - name: Deploy Docker image to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          # Copy Docker image to VPS
          scp /tmp/worksphere-image.tar $VPS_USER@$VPS_HOST:/home/$VPS_USER/
          
          # Copy production docker-compose file to VPS
          scp docker-compose.prod.yml $VPS_USER@$VPS_HOST:/home/$VPS_USER/docker-compose.yml
          scp init-db.sql $VPS_USER@$VPS_HOST:/home/$VPS_USER/
          
          ssh -T $VPS_USER@$VPS_HOST << 'EOF'
            # Load the new Docker image
            docker load -i ~/worksphere-image.tar
            
            # Move files to deployment directory
            sudo mv ~/docker-compose.yml /opt/worksphere/
            sudo mv ~/init-db.sql /opt/worksphere/
            
            # Stop current containers
            cd /opt/worksphere
            sudo docker-compose down 2>/dev/null || true
            
            # Start new containers
            sudo docker-compose up -d
            
            # Wait for application to start
            sleep 45
            
            # Clean up downloaded files
            rm -f ~/worksphere-image.tar
          EOF

      - name: Final health check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_PORT: ${{ secrets.APP_PORT }}
        run: |
          ssh -T $VPS_USER@$VPS_HOST << EOF
            STATUS=\$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$APP_PORT/actuator/health || echo 000)
            [ "\$STATUS" = "200" ] || exit 1
          EOF

      - name: Notify deployment status
        if: always()
        run: |
          echo "Job status: ${{ job.status }}"
