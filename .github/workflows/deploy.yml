name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: development
          JWT_SECRET: test-secret-key-for-ci-testing-purposes-only-32chars
          JWT_ACCESS_TOKEN_EXPIRATION: 3600000
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          GOOGLE_OAUTH2_CLIENT_ID: test-client-id
          GOOGLE_OAUTH2_CLIENT_SECRET: test-client-secret
          GOOGLE_OAUTH2_REDIRECT_URI: http://localhost:8080/login/oauth2/code/google
          SERVER_PORT: 8080
          FRONTEND_URL: http://localhost:3000
          OAUTH_SUCCESS_REDIRECT_PATH: /oauth/callback

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: worksphere-jar
          path: build/libs/*.jar
          retention-days: 1

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: worksphere-jar
          path: build/libs

      - name: Get JAR filename
        id: jar
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT

      - name: Verify secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_PORT: ${{ secrets.APP_PORT }}
        run: |
          for var in VPS_SSH_KEY VPS_HOST VPS_USER APP_PORT; do
            if [ -z "${!var}" ]; then
              echo "❌ Secret $var is not set"
              exit 1
            fi
          done
          echo "✅ All required secrets are configured"

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create deployment directory on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            mkdir -p /opt/worksphere/backup /opt/worksphere/logs
          EOF

      - name: Backup current JAR
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            if [ -f /opt/worksphere/worksphere.jar ]; then
              cp /opt/worksphere/worksphere.jar \
                 /opt/worksphere/backup/worksphere-$(date +%Y%m%d_%H%M%S).jar
              cd /opt/worksphere/backup && ls -t | tail -n +6 | xargs -r rm --
            fi
          EOF

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp ${{ steps.jar.outputs.jar_file }} \
            $VPS_USER@$VPS_HOST:/opt/worksphere/worksphere.jar

          ssh $VPS_USER@$VPS_HOST << 'EOF'
            sudo systemctl restart worksphere
            sleep 15
            systemctl is-active --quiet worksphere || exit 1
          EOF

      - name: Final health check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_PORT: ${{ secrets.APP_PORT }}
        run: |
          ssh $VPS_USER@$VPS_HOST << EOF
            STATUS=\$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$APP_PORT/actuator/health || echo 000)
            [ "\$STATUS" = "200" ] || exit 1
          EOF

      - name: Notify deployment status
        if: always()
        run: |
          echo "Job status: ${{ job.status }}"
